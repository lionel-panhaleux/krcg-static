name: Data
on:
  workflow_dispatch:
  schedule:
    # Refresh the data files every 6 hours
    - cron: "0 */6 * * *"

jobs:
  data:
    runs-on: ubuntu-latest
    environment: krcg.org
    steps:
      - uses: actions/checkout@v6
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync
      - name: Build data files
        run: uv run krcg-static build --data
      - name: Setup SSH key
        run: |
          mkdir /home/runner/.ssh
          echo "${{ secrets.KRCG_DEPLOY_KEY }}" > /home/runner/.ssh/id_rsa
          chmod 600 /home/runner/.ssh/id_rsa
          echo "${{ secrets.KRCG_GRA_HOST_ID }}" > /home/runner/.ssh/known_hosts
          echo "${{ secrets.KRCG_SBG_HOST_ID }}" >> /home/runner/.ssh/known_hosts
      - name: Deploy data files to krcg-sbg
        run: rsync -rlptq --delete-after -e ssh build/data/ lpanhaleux@51.178.45.139:projects/static.krcg.org/dist/data
